spring:
  application:
    name: inventory-service
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:inventorytest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
eureka:
  client:
    enabled: false
management:
  tracing:
    enabled: false
  zipkin:
    tracing:
      endpoint: ""
