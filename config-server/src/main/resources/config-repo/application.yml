management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,circuitbreakers,info
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: B3

spring:
  kafka:
    template:
      observation-enabled: true
    listener:
      observation-enabled: true

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.shopscale: ${LOG_LEVEL_APP:INFO}

eureka:
  instance:
    lease-renewal-interval-in-seconds: 5
    lease-expiration-duration-in-seconds: 15
  client:
    registry-fetch-interval-seconds: 5
